name: Deploy Next.js App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy & Build on EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Go to project folder on EC2
            cd /home/ubuntu/Clinicx-main || exit 1
            echo "📁 Changed directory to /home/ubuntu/Clinicx-main"

            # Pull latest code
            git pull origin main

            # Install dependencies
            npm install

            # Build Next.js (static export)
            npm run build
            npm run export

            # Move new build to Nginx web root
            sudo rm -rf /var/www/clinicx
            sudo mv out /var/www/clinicx

            # Fix permissions
            sudo chown -R www-data:www-data /var/www/clinicx

            # Reload Nginx
            sudo systemctl reload nginx || sudo systemctl restart nginx

            echo "🚀 Deployment complete! App should be live."
