name: Deploy Next.js App to EC2

on:
  push:
    branches:
      - stagging
      - main
      - updated-code
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Read DEPLOY_BRANCH from .env file
      - name: Read deploy branch from .env
        id: get_branch
        run: |
          BRANCH=$(grep -E "^DEPLOY_BRANCH=" .env | cut -d '=' -f2 | tr -d ' "')
          echo "branch=${BRANCH:-stagging}" >> $GITHUB_OUTPUT
          echo "Deploy branch: ${BRANCH:-stagging}"

      - name: Deploy & Restart on EC2
        uses: appleboy/ssh-action@v1.1.0
        env:
          DEPLOY_BRANCH: ${{ steps.get_branch.outputs.branch }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          envs: DEPLOY_BRANCH
          script: |
            BRANCH="${DEPLOY_BRANCH:-stagging}"
            echo "Starting deployment on EC2 for branch: $BRANCH"

            # Stop any running PM2 processes first
            pm2 delete clinicx || true

            # Remove any previous directory and do a fresh clone
            echo "Removing old directory if exists..."
            rm -rf /home/ubuntu/Clinicx-stagging

            echo "Cloning fresh repository..."
            cd /home/ubuntu
            git clone https://${{ secrets.GH_PAT }}@github.com/Clinicxus/Clinicx-main.git Clinicx-stagging
            cd Clinicx-stagging
            git checkout $BRANCH

            echo "Installing dependencies..."
            npm install --legacy-peer-deps

            echo "Cleaning old build..."
            rm -rf .next

            echo "Building Next.js app..."
            npm i sharp
            npm run build

            echo "Restarting app with PM2..."
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi

            # Stop old instance (ignore errors if not found)
            pm2 delete clinicx || true

            # Start app explicitly on port 3001
            PORT=3001 pm2 start "npm run start" --name clinicx

            pm2 save
            pm2 startup systemd -u ubuntu --hp /home/ubuntu

            echo "Testing Nginx configuration..."
            sudo nginx -t

            echo "Reloading Nginx..."
            sudo systemctl reload nginx

            echo "Deployment complete!"
            echo "App is live at https://app.clinicx.io (branch: $BRANCH)"
