name: Deploy Next.js App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy & Restart on EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Starting deployment on EC2..."

            # Move to your app directory
            cd /home/ubuntu/Clinicx-main || exit 1

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing dependencies..."
            npm install --legacy-peer-deps

            echo "Building Next.js app..."
            npm run build

            echo "🔁 Restarting app with PM2..."
            # Ensure PM2 is installed
            if ! command -v pm2 &> /dev/null
            then
              sudo npm install -g pm2
            fi

            # Stop old process if it exists
            pm2 delete clinicx || true

            # Start the app in production mode
            pm2 start "npm run start" --name clinicx

            # Save PM2 process list & startup setup
            pm2 save
            pm2 startup systemd -u ubuntu --hp /home/ubuntu

            echo "Reloading Nginx..."
            sudo nginx -t && sudo systemctl reload nginx

            echo "Deployment complete! Visit your EC2 public IP."
